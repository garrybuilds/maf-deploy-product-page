<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAF Deploy — Forward-Deployed AI Team | Malwa Asset Firm</title>
  <meta name="description" content="We deploy AI into your business. Not a tool. Not a platform. A forward-deployed AI team that diagnoses what's broken, builds on top of your existing systems, and runs your operations 24/7.">
  <meta property="og:title" content="MAF Deploy — Forward-Deployed AI Team">
  <meta property="og:description" content="We deploy AI into your business. A forward-deployed AI team for service businesses $1M–$25M.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://deploy.malwaassetfirm.com/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="MAF Deploy — Forward-Deployed AI Team">
  <meta name="twitter:description" content="We deploy AI into your business. A forward-deployed AI team for service businesses $1M–$25M.">
  <link rel="canonical" href="https://deploy.malwaassetfirm.com/">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600&family=Source+Code+Pro:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%23533afd'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='system-ui' font-size='18' font-weight='600'>M</text></svg>">
  <script>(function(){var s=localStorage.getItem('theme');if(s)document.documentElement.setAttribute('data-theme',s);})();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #533afd;
      --purple-hover: #4434d4;
      --purple-light: #b9b9f9;
      --navy: #061b31;
      --slate: #64748d;
      --label: #273951;
      --white: #ffffff;
      --border: #e5edf5;
      --brand-dark: #1c1e54;
      --success: #15be53;
      --success-text: #0a7a33;
      --shadow-blue: rgba(50,50,93,0.25);
      --shadow-black: rgba(0,0,0,0.1);
      --shadow-ambient: rgba(23,23,23,0.08);
      --radius: 6px;
      --radius-sm: 4px;
      --radius-lg: 8px;
      --bg: #ffffff;
      --bg-alt: #f8f9fc;
      --card-bg: #ffffff;
      --nav-bg: rgba(255,255,255,0.92);
      --text: #64748d;
      --heading: #061b31;
      --footer-bg: #f8f9fc;
      --footer-text: #64748d;
    }

    [data-theme="dark"] {
      --purple: #7c6ff7;
      --purple-hover: #6a5ce5;
      --purple-light: #4a3f8a;
      --navy: #e2e8f0;
      --slate: #94a3b8;
      --label: #cbd5e1;
      --white: #0f1117;
      --border: #1e293b;
      --brand-dark: #0f1117;
      --success: #22c55e;
      --success-text: #4ade80;
      --shadow-blue: rgba(0,0,0,0.4);
      --shadow-black: rgba(0,0,0,0.3);
      --shadow-ambient: rgba(0,0,0,0.2);
      --bg: #0f1117;
      --bg-alt: #15171f;
      --card-bg: #1a1d27;
      --nav-bg: rgba(15,17,23,0.92);
      --text: #94a3b8;
      --heading: #e2e8f0;
      --footer-bg: #15171f;
      --footer-text: #94a3b8;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 400;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4 { color: var(--heading); font-weight: 300; line-height: 1.2; }
    h1 { font-size: clamp(2rem, 5vw, 3.5rem); }
    h2 { font-size: clamp(1.5rem, 3.5vw, 2.25rem); }
    h3 { font-size: clamp(1.1rem, 2.5vw, 1.5rem); }

    a { color: var(--purple); text-decoration: none; }
    a:hover { color: var(--purple-hover); }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    /* Nav */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--nav-bg); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 12px 0;
    }
    .nav .container { display: flex; justify-content: space-between; align-items: center; }
    .nav-logo { font-weight: 600; font-size: 1.1rem; color: var(--heading); }
    .nav-logo span { color: var(--purple); }
    .nav-actions { display: flex; align-items: center; gap: 16px; }

    /* Theme toggle */
    .theme-toggle {
      background: none; border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); cursor: pointer; width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; transition: all 0.2s;
    }
    .theme-toggle:hover { border-color: var(--purple); color: var(--purple); }
    [data-theme="dark"] .icon-sun { display: inline; }
    [data-theme="dark"] .icon-moon { display: none; }
    [data-theme="light"] .icon-sun { display: none; }
    [data-theme="light"] .icon-moon { display: inline; }

    /* Buttons */
    .btn {
      display: inline-block; padding: 12px 28px; border-radius: var(--radius);
      font-family: 'Source Sans 3', sans-serif; font-weight: 500; font-size: 1rem;
      cursor: pointer; transition: all 0.2s; border: none; text-align: center;
    }
    .btn-primary { background: var(--purple); color: #fff; }
    .btn-primary:hover { background: var(--purple-hover); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--heading); }
    .btn-outline:hover { border-color: var(--purple); color: var(--purple); }

    /* Sections */
    section { padding: 80px 0; }
    .section-header { text-align: center; max-width: 700px; margin: 0 auto 48px; }
    .section-header h2 { margin-bottom: 16px; }
    .section-header p { font-size: 1.1rem; }

    /* Footer */
    footer {
      background: var(--footer-bg); border-top: 1px solid var(--border);
      padding: 40px 0; text-align: center; color: var(--footer-text); font-size: 0.9rem;
    }
    footer a { color: var(--footer-text); }
    footer a:hover { color: var(--purple); }

    /* Responsive */
    @media (max-width: 768px) {
      section { padding: 48px 0; }
      .container { padding: 0 16px; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="container">
      <div class="nav-logo">MAF <span>Deploy</span></div>
      <div class="nav-actions">
        <a href="#audit" class="btn btn-primary" style="padding:8px 20px;font-size:0.9rem;">Get Your Free Audit →</a>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
          <span class="icon-sun">☀️</span>
          <span class="icon-moon">🌙</span>
        </button>
      </div>
    </div>
  </nav>

  <main>
    <!-- Placeholder sections — content added in subsequent tasks -->
    <section id="hero" style="min-height:60vh;display:flex;align-items:center;text-align:center;">
      <div class="container">
        <p style="color:var(--slate);">Hero section — Task 3</p>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>MAF Deploy is a product of <a href="https://malwaassetfirm.com">Malwa Asset Firm</a></p>
      <p style="margin-top:4px;"><a href="mailto:garry@malwaassetfirm.com">garry@malwaassetfirm.com</a></p>
    </div>
  </footer>

  <script>
    function toggleTheme() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }
  </script>

</body>
</html>
